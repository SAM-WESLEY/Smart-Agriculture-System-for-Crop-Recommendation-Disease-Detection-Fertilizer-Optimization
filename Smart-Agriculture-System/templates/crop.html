<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>Crop Recommendation — Smart Agriculture</title>
<link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
<header><h1>🌱 Crop Recommendation</h1><p>Enter your soil and climate data to get the best crop suggestion</p></header>
<div class="container">
  <a href="/" class="back">← Back to Home</a>
  <div class="form-group"><label>Nitrogen (N)</label><input type="number" id="N" placeholder="e.g. 90"/></div>
  <div class="form-group"><label>Phosphorus (P)</label><input type="number" id="P" placeholder="e.g. 42"/></div>
  <div class="form-group"><label>Potassium (K)</label><input type="number" id="K" placeholder="e.g. 43"/></div>
  <div class="form-group"><label>Temperature (°C)</label><input type="number" id="temperature" placeholder="e.g. 25"/></div>
  <div class="form-group"><label>Humidity (%)</label><input type="number" id="humidity" placeholder="e.g. 80"/></div>
  <div class="form-group"><label>Soil pH</label><input type="number" step="0.1" id="ph" placeholder="e.g. 6.5"/></div>
  <div class="form-group"><label>Rainfall (mm)</label><input type="number" id="rainfall" placeholder="e.g. 200"/></div>
  <button class="submit-btn" onclick="predict()">🌾 Recommend Crop</button>
  <div id="result" style="display:none" class="result"><h3 id="crop-name"></h3><p>is the recommended crop for your conditions.</p></div>
</div>
<footer>Built by Sam Wesley S &nbsp;|&nbsp; Karunya Institute of Technology and Sciences</footer>
<script>
function predict() {
  const data = {
    N: document.getElementById('N').value,
    P: document.getElementById('P').value,
    K: document.getElementById('K').value,
    temperature: document.getElementById('temperature').value,
    humidity: document.getElementById('humidity').value,
    ph: document.getElementById('ph').value,
    rainfall: document.getElementById('rainfall').value,
  };
  fetch('/predict/crop', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(data) })
    .then(r => r.json())
    .then(d => {
      document.getElementById('crop-name').textContent = d.crop;
      document.getElementById('result').style.display = 'block';
    });
}
</script>
</body>
</html>
